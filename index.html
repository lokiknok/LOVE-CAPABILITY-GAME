<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Compatibility Calculator ❤️</title>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --secondary-pink: #ff758f;
            --light-pink: #fff0f3;
            --dark-pink: #c9184a;
            --text-color: #4a4a4a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec 0%, #ffc2d1 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            padding: 2rem 0;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: var(--dark-pink);
            margin-bottom: 0.5rem;
            font-size: 2rem;
        }

        .subtitle {
            color: #7a7a7a;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            color: var(--dark-pink);
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 2px solid #ffccd5;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--primary-pink);
        }

        .gift-reveal-container {
            background: var(--light-pink);
            border: 2px dashed var(--secondary-pink);
            border-radius: 15px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .gift-reveal-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--dark-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.3rem;
        }

        .gift-tag {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-color);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .heart-divider {
            font-size: 2rem;
            margin: 0.5rem 0;
            animation: pulse 1.5s infinite;
            color: var(--primary-pink);
        }

        button {
            background: linear-gradient(135deg, var(--primary-pink) 0%, var(--secondary-pink) 100%);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 77, 109, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .result-container {
            margin-top: 2rem;
            display: none;
            animation: fadeIn 0.5s ease-out forwards;
        }

        .score-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: var(--light-pink);
            border: 4px dashed var(--primary-pink);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1rem;
            font-size: 2rem;
            font-weight: bold;
            color: var(--dark-pink);
            position: relative;
        }

        .relationship-status {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--dark-pink);
            margin-bottom: 1rem;
        }

        .message {
            font-size: 1.1rem;
            color: var(--text-color);
            font-weight: 500;
            line-height: 1.5;
            padding: 0 1rem;
        }

        .floating-heart {
            position: absolute;
            color: rgba(255, 77, 109, 0.6);
            pointer-events: none;
            animation: floatUp 3s linear forwards;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-10vh) scale(1.5);
                opacity: 0;
            }
        }

        .loader {
            display: none;
            margin: 1.5rem auto;
            font-size: 1.5rem;
        }
        .loader span {
            display: inline-block;
            animation: bounce 0.3s infinite alternate;
        }
        .loader span:nth-child(2) { animation-delay: 0.1s; }
        .loader span:nth-child(3) { animation-delay: 0.2s; }

        @keyframes bounce {
            to { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Love Calculator 💖</h1>
        <p class="subtitle">Find out if it's destiny or disaster!</p>

        <div class="input-group">
            <label for="name1">Your Name</label>
            <input type="text" id="name1" placeholder="Enter your name..." autocomplete="off">
        </div>

        <div class="heart-divider">❤️</div>

        <div class="input-group">
            <label for="name2">Their Name</label>
            <input type="text" id="name2" placeholder="Enter their name..." autocomplete="off">
        </div>

        <button onclick="calculateLove()">Calculate Compatibility!</button>

        <div class="loader" id="loader">
            <span>❤️</span><span>💖</span><span>💝</span>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="gift-reveal-container">
                <div class="gift-reveal-title">🎁 Give Gift</div>
                <div class="gift-tag" id="giftDisplay">Evaluating...</div>
            </div>

            <div class="score-circle" id="scoreDisplay">0%</div>
            <div class="relationship-status" id="statusDisplay">Stranger 😶</div>
            <p class="message" id="messageDisplay"></p>
        </div>
    </div>

    <script>
        // Completely rewritten sweet and warm message database
        const messages = {
            soulmate: [
                "Two hearts beautifully meant to walk this lifetime together. You fit perfectly beside each other, bringing endless smiles and warmth. Simply magical! ✨🌸",
                "Your bond is pure poetry written by the stars themselves. You bring out the most beautiful colors in each other's lives. A wonderful, absolute forever love Story. 💫🍃",
                "An absolute celestial masterpiece of a match. Being together feels just like a cozy dream come true, safe, happy, and boundlessly lovely. 🕊️💎"
            ],
            dating: [
                "Every sweet moment shared between you two whispers promise and charm. There is such an endearing warmth blossoming right here. 🌹🧸",
                "A truly beautiful chapter is unfolding! Your smiles reflect off each other in the loveliest ways, creating something deeply wonderful. 💕🌙",
                "Two wonderful souls dancing perfectly to the very same melody. Your mutual care and bright chemistry make everything so sweet. 🌷🍯"
            ],
            crush: [
                "There is a beautiful whisper of affection lingering right beneath the surface. Each little conversation feels like sunshine breaking through. 🍓🎈",
                "A cute little spark that makes the heart flutter softly. Gentle smiles and lovely daydreams are quietly weaving you closer together. 🥰💌",
                "The sweetest possibilities are calling out! You have an incredibly gentle, affectionate foundation just waiting to naturally grow. 🌱🧁"
            ],
            friend: [
                "A beautiful, kind-hearted friendship built on trust and wonderful shared smiles. Having each other around makes the days infinitely brighter. 🤗☀️",
                "Your mutual understanding forms a beautiful, comforting circle of safety and laughter. It's a wonderful connection to cherish. 🍀🍰",
                "A sweet and dependable bond that always leaves room for a brighter smile. Having this level of care is a wonderful gift. 🌻🎀"
            ],
            stranger: [
                "A fresh slate full of mystery and gentle curiosity! Every single beautiful story in this world started out with just a simple hello. 🗺️🍃",
                "The paths have softly crossed, leaving a quiet canvas waiting to be filled with wonderful interactions and unexpected sweet moments. 🤍🎨",
                "A gentle starting point where kind interactions can bloom. Life is beautifully full of sweet surprises just waiting around the corner. ✨🌟"
            ]
        };

        function getRandomMessage(tier) {
            const list = messages[tier];
            return list[Math.floor(Math.random() * list.length)];
        }

        function calculateLove() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();
            const loader = document.getElementById('loader');
            const resultContainer = document.getElementById('resultContainer');
            const scoreDisplay = document.getElementById('scoreDisplay');
            const giftDisplay = document.getElementById('giftDisplay');
            const statusDisplay = document.getElementById('statusDisplay');
            const messageDisplay = document.getElementById('messageDisplay');

            if (name1 === "" || name2 === "") {
                alert("Please enter both names! Love requires two people (usually).");
                return;
            }

            resultContainer.style.display = 'none';
            loader.style.display = 'block';

            for(let i = 0; i < 10; i++) {
                createHeart();
            }

            setTimeout(() => {
                loader.style.display = 'none';
                
                let finalScore = 0;
                let giftText = "";
                let isSpecialMatch = false;

                const n1 = name1.toLowerCase().replace(/\s/g, "");
                const n2 = name2.toLowerCase().replace(/\s/g, "");

                // Catch-all sweet verification for Ruban Kishore/Kishire and Nivetha combinations
                const checkRuban = (n1.includes("ruban") && (n1.includes("kishore") || n1.includes("kishire")) && n2 === "nivetha");
                const checkNivetha = (n2.includes("ruban") && (n2.includes("kishore") || n2.includes("kishire")) && n1 === "nivetha");

                if (checkRuban || checkNivetha) {
                    finalScore = 99;
                    giftText = "Roses 🌹";
                    isSpecialMatch = true;
                } else {
                    const combinedString = n1 + n2;
                    let sum = 0;
                    for (let i = 0; i < combinedString.length; i++) {
                        sum += combinedString.charCodeAt(i);
                    }
                    let baseScore = (sum % 101); 

                    let giftBonus = 0;
                    if (baseScore >= 75) {
                        giftText = "Roses 🌹";
                        giftBonus = 15;
                    } else if (baseScore >= 30) {
                        giftText = "Chocolate 🍫";
                        giftBonus = 10;
                    } else {
                        giftText = "Teddy Bear 🧸";
                        giftBonus = 5;
                    }
                    
                    finalScore = Math.min(baseScore + giftBonus, 100);
                }

                let relationLevel = "";
                let selectedText = "";

                if (finalScore >= 90) {
                    relationLevel = "Soulmate 💍";
                    selectedText = getRandomMessage('soulmate');
                } else if (finalScore >= 75) {
                    relationLevel = "Dating 💕";
                    selectedText = getRandomMessage('dating');
                } else if (finalScore >= 50) {
                    relationLevel = "Crush 😍";
                    selectedText = getRandomMessage('crush');
                } else if (finalScore >= 30) {
                    relationLevel = "Friend 😊";
                    selectedText = getRandomMessage('friend');
                } else {
                    relationLevel = "Stranger 😶";
                    selectedText = getRandomMessage('stranger');
                }

                // If it's the special couple match, infuse it with ultra-sweet emojis
                if (isSpecialMatch) {
                    selectedText = "💞✨ Ruban and Nivetha share a love that is pure magic. Designed flawlessly for one another, your hearts speak the sweetest language of forever love. 👩‍❤️‍👨💒💍";
                }

                giftDisplay.innerText = giftText;
                statusDisplay.innerText = relationLevel;
                messageDisplay.innerHTML = selectedText;
                
                resultContainer.style.display = 'block';
                animateScore(scoreDisplay, finalScore);

                if (finalScore >= 75) {
                    let bursts = 0;
                    const interval = setInterval(() => {
                        createHeart();
                        bursts++;
                        if (bursts > 15) clearInterval(interval);
                    }, 100);
                }

            }, 1500);
        }

        function animateScore(element, targetScore) {
            let currentScore = 0;
            const duration = 1000; 
            const stepTime = Math.max(Math.floor(duration / (targetScore || 1)), 10);
            
            const timer = setInterval(() => {
                if (currentScore >= targetScore) {
                    element.innerText = targetScore + "%";
                    clearInterval(timer);
                } else {
                    currentScore++;
                    element.innerText = currentScore + "%";
                }
            }, stepTime);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('floating-heart');
            
            const hearts = ['❤️', '💖', '💝', '💕', '💘', '🌸', '✨'];
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = (Math.random() * 2 + 2) + "s";
            heart.style.fontSize = (Math.random() * 1.5 + 1) + "rem";
            
            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }
    </script>
</body>
</html>
